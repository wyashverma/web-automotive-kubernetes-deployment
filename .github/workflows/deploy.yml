name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 400 key.pem

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          
          cd ~/laravel-automotive-kubernetes-deployment
          
          # Pull latest code
          git pull origin main
          
          # Stop and remove only the app container
          docker stop multiagent-app || true
          docker rm multiagent-app || true
          
          # Build new image
          docker build -t multiagent-ai .
          
          # Run new container with name and auto-restart
          docker run -d \
            --name multiagent-app \
            --restart unless-stopped \
            -p 8000:8000 \
            multiagent-ai
          
          # Clean up old images (optional)
          docker image prune -f
          
          EOF
